experiment_name: cviq_default
seed: 3407
output_dir: runs/cviq_default

paths:
  dataset_root: F:/ws/dataset/data/CVIQ
  manifest_csv: F:/ws/dataset/data/CVIQ/metadata/manifest_cviq.csv
  split_dir: F:/ws/dataset/data/CVIQ/metadata/splits

split:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  stratify_by: compression_type
  split_seed: 3407

training:
  batch_size: 4
  num_workers: 4
  epochs: 300
  lr: 1.0e-3
  weight_decay: 1.0e-4
  momentum: 0.9
  scheduler_gamma: 0.9
  amp: true
  clip_grad_norm: 5.0
  accumulation_steps: 1
  best_metric: PLCC
  early_stopping_patience: null
  max_train_batches: null
  max_eval_batches: null
  save_every: 10

model:
  image_size: [2048, 4096]
  viewport_size: [256, 256]
  num_viewports: 20
  num_distortion_levels: 5
  compression_classes: [JPEG, AVC, HEVC, ref]
  local_backbone_name: resnet50
  global_backbone_type: timm_hierarchical
  global_backbone_name: vmamba_tiny
  global_backbone_fallback: swin_tiny_patch4_window7_224
  pretrained: true
  fused_dim: 256
  shared_dim: 1024
  aux_hidden_dim: 64
  use_local: true
  use_global: true
  use_bs_msfa: true
  use_auxiliary_tasks: true

loss:
  mos_weight: 1.0
  distortion_weight: 0.1
  compression_weight: 0.1

degradation:
  jpeg_quality_range: [20, 90]
  gaussian_sigma_range: [0.0, 0.012]
  blur_kernel_sizes: [3, 5, 7]
  blur_sigma_range: [0.1, 2.0]
  downsample_scales: [0.5, 0.75]
  camera_noise_std_range: [0.0, 0.02]
  random_order: true
  seed: 3407

evaluation:
  fit_nonlinear_mapping: true

data:
  use_precomputed_degraded: true
